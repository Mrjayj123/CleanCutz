<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Clean Cutz | AI Video Studio</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="mesh-gradient"></div>
    <div id="login-container" class=overlay>
        <div class="glass auth-card">
            <h1 class=" logo-text">Clean <span>Cutz</span></h1>
            <p>A One of a kind Video Editing Experience</p>
            
            <input type="text" id="username" placeholder="Editor Name">
            
            <button id="login-btn" class="btn-primary">Launch Studio</button>
            
            <p id="login-error" class="error hidden" style="color: #ff4b4b; margin-top: 15px; font-size: 0.8rem;">
                Invalid credentials
            </p>
        </div>
    </div>

    <main id="app-container" class="app-layout hidden">
        <nav class="navbar">
            <div class="logo">CLEAN<span>CUTZ</span></div>
            <button id="logout-btn" class="btn-outline">Logout</button>
        </nav>

        <div class="studio-content">
            
            <aside class="sidebar glass">
                <div class="sidebar-label">LIBRARY</div>
                <div id="video-list">
                    </div>
            </aside>

            <section class="editor-main">
                
                <div class="video-preview glass">
                    <video id="main-video" controls>
                    </video>
                </div>

                <div class="console glass">
                    <h2 style="font-size: 1.2rem; margin-bottom: 5px;">Trimming Console</h2>
                    <p style="color: var(--text-dim); font-size: 0.8rem; margin-bottom: 20px;">
                        Set points to clip and borrow footage.
                    </p>

                    <div class="input-grid">
                        <div class="input-field">
                            <label>START POINT (SEC)</label>
                            <input type="number" id="start-time" value="0" min="0">
                        </div>
                        <div class="input-field">
                            <label>END POINT (SEC)</label>
                            <input type="number" id="end-time" value="10" min="1">
                        </div>
                    </div>

                    <button id="cut-btn" class="btn-primary">Capture & Borrow Clip</button>
                </div>

            </section>
        </div>
    </main>

    <script src="index.js"></script>
</body>
</html>
