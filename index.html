<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Editor's Video Portal</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div id="login-container">
        <div class="card">
            <h2>Editor Login</h2>
            <input type="text" id="username" placeholder="Username">
            <button id="login-btn">Login</button>
            <p id="login-error" class="error hidden">Invalid credentials</p>
        </div>
    </div>

    <main id="app-container" class="hidden">
        <header>
            <h1>Video Footage Library</h1>
            <button id="logout-btn">Logout</button>
        </header>

        <section id="video-workspace">
            <div class="video-player-box">
                <video id="main-video" controls>
                    <source src="" type="video/mp4">
                </video>
            </div>

            <div class="controls-card">
                <h3>Footage Trimmer</h3>
                <div class="input-group">
                    <label>Start Time (sec):</label>
                    <input type="number" id="start-time" value="0">
                </div>
                <div class="input-group">
                    <label>End Time (sec):</label>
                    <input type="number" id="end-time" value="10">
                </div>
                <button id="cut-btn">Clip & Borrow Footage</button>
            </div>
        </section>

        <section id="library">
            <h2>Available Footage</h2>
            <div id="video-list"></div>
        </section>
    </main>

    <script src="index.js"></script>
</body>
</html>
